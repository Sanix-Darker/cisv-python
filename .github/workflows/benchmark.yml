name: Benchmark Python

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Build benchmark image
        run: docker build -t cisv-pynb-bench -f cisv/benchmarks/Dockerfile .
      - name: Run benchmark
        run: |
          set -euo pipefail
          docker run --rm --platform linux/amd64 --cpus=2 --memory=4g cisv-pynb-bench --rows 200000 --only-cisv | tee bench.out
          grep -q "cisv-iterator" bench.out
