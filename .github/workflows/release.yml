name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepare version and sources
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          [ "$TAG_VERSION" = "$VERSION" ] || {
            echo "Tag/version mismatch: tag=$TAG_VERSION VERSION=$VERSION"
            exit 1
          }
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" bindings/python-nanobind/pyproject.toml
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" bindings/python/pyproject.toml
          rm -rf bindings/python-nanobind/core
          cp -r core bindings/python-nanobind/core
      - name: Build wheel and sdist
        run: |
          make -C core all
          cd bindings/python-nanobind
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: bindings/python-nanobind/dist/*

  publish-pypi:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Validate PyPI token
        run: |
          if [ -z "${PYPI_API_TOKEN:-}" ]; then
            echo "PYPI_API_TOKEN secret is missing or empty"
            exit 1
          fi
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          attestations: false
          password: ${{ secrets.PYPI_API_TOKEN }}

  release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
