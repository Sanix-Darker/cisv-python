name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepare version and sources
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [ "$TAG_VERSION" = "$VERSION" ] || {
              echo "Tag/version mismatch: tag=$TAG_VERSION VERSION=$VERSION"
              exit 1
            }
          fi
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" cisv/pyproject.toml
          rm -rf cisv/core
          cp -r core/core cisv/core
      - name: Build sdist
        run: |
          make -C core/core all
          cd cisv
          pip install build
          python -m build --sdist
      - name: Build manylinux wheel
        uses: pypa/cibuildwheel@v2.23.0
        env:
          CIBW_BUILD: cp312-manylinux_x86_64
          CIBW_SKIP: "pp* *-musllinux*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD_FRONTEND: build
        with:
          package-dir: cisv
          output-dir: cisv/dist
      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: cisv/dist/*

  publish-pypi:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Validate PyPI token
        run: |
          if [ -z "${PYPI_API_TOKEN:-}" ]; then
            echo "PYPI_API_TOKEN secret is missing or empty"
            exit 1
          fi
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          attestations: false
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Resolve release tag
        id: rel
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
