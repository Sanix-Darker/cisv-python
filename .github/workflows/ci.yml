name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build core
        run: make -C core all
      - name: Install and test nanobind binding
        run: |
          cd bindings/python-nanobind
          pip install -U pip
          pip install .
          cd /tmp
          python - <<'PY'
          import cisv
          rows = cisv.parse_string("a,b\n1,2\n")
          assert rows[0] == ["a", "b"]
          assert rows[1] == ["1", "2"]
          print(cisv.__version__)
          PY
