name: CI

on:
  push:
  pull_request:

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Verify VERSION matches pyproject version
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          PY_VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' cisv/pyproject.toml | head -n1)"
          [ "$VERSION" = "$PY_VERSION" ] || {
            echo "Version mismatch: VERSION=$VERSION pyproject=$PY_VERSION"
            exit 1
          }

  python:
    runs-on: ubuntu-latest
    needs: version-sync
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build core
        run: make -C core/core all
      - name: Install and test nanobind binding
        run: |
          cd cisv
          pip install -U pip
          pip install .
          cd /tmp
          python - <<'PY'
          import cisv
          rows = cisv.parse_string("a,b\n1,2\n")
          assert rows[0] == ["a", "b"]
          assert rows[1] == ["1", "2"]
          print(cisv.__version__)
          PY
