name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build core
        run: make -C core all
      - name: Install and test nanobind binding
        run: |
          cd bindings/python-nanobind
          pip install -U pip
          pip install .
          python -c "import cisv; print(cisv.__version__)"
